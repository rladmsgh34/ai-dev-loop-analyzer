name: Sync Rules to gwangcheon-shop CLAUDE.md

on:
  workflow_run:
    workflows: ["Daily PR Pattern Review"]
    types: [completed]
  workflow_dispatch:

jobs:
  sync:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: ai-dev-loop-analyzer 체크아웃
        uses: actions/checkout@v4

      - name: gwangcheon-shop 체크아웃
        uses: actions/checkout@v4
        with:
          repository: rladmsgh34/gwangcheon-shop
          token: ${{ secrets.GH_PAT }}
          path: gwangcheon-shop

      - name: PR 분석 실행
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr list \
            --repo rladmsgh34/gwangcheon-shop \
            --state merged \
            --limit 300 \
            --json number,title,mergedAt,additions,deletions \
            > /tmp/prs.json

          python3 src/analyze.py \
            --input /tmp/prs.json \
            --github-token "$GH_TOKEN" \
            --format json \
            2>/dev/null > /tmp/report.json

          DATE=$(date +%Y-%m-%d)
          echo "date=$DATE" >> $GITHUB_ENV

      - name: CLAUDE.md 패치 생성
        id: patch
        run: |
          python3 src/patch_claude_md.py \
            --report /tmp/report.json \
            --claude-md gwangcheon-shop/CLAUDE.md \
            --date "$date" \
            2>&1 | tee /tmp/patch-log.txt

          if grep -q "신규 규칙 없음" /tmp/patch-log.txt; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: PR 생성
        if: steps.patch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd gwangcheon-shop

          git config user.name "ai-dev-loop-analyzer[bot]"
          git config user.email "ai-dev-loop-analyzer@users.noreply.github.com"

          BRANCH="chore/ai-loop-rules-$date"
          git checkout -b "$BRANCH"
          git add CLAUDE.md
          git commit -m "chore: AI Dev Loop 자동 규칙 업데이트 ($date)"
          git push origin "$BRANCH"

          RULES=$(grep "^-" /tmp/patch-log.txt | head -10)

          gh pr create \
            --repo rladmsgh34/gwangcheon-shop \
            --title "chore: AI Dev Loop 규칙 업데이트 ($date)" \
            --body "$(cat <<EOF
## AI Dev Loop — 자동 생성 PR

[ai-dev-loop-analyzer](https://github.com/rladmsgh34/ai-dev-loop-analyzer)가 PR 히스토리를 분석해 감지한 패턴을 CLAUDE.md에 반영합니다.

### 추가된 규칙

$RULES

### 검토 방법
1. 규칙이 실제 프로젝트 상황에 맞는지 확인
2. 불필요한 규칙은 삭제 후 머지
3. 머지하면 다음 Claude Code 세션부터 자동 적용

---
_자동 생성: ai-dev-loop-analyzer · $date_
EOF
)" \
            --base main \
            --head "$BRANCH"
