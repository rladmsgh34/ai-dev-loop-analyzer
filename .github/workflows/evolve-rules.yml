name: Evolve Rules

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — 분석만 하고 PR 생성 생략'
        type: boolean
        default: false
      fetch_files:
        description: 'fix PR 파일 + 리뷰 코멘트 수집 (더 정확, 느림)'
        type: boolean
        default: true

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout ai-dev-loop-analyzer
        uses: actions/checkout@v4

      # ── Step 0: prerequisites ───────────────────────────────────────────────
      - name: Ensure labels and data directory
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "daily-report" --color "e4e669" --description "Daily auto-analysis report" 2>/dev/null || true
          mkdir -p data
          touch data/rules-history.json

      - name: Checkout gwangcheon-shop
        uses: actions/checkout@v4
        with:
          repository: rladmsgh34/gwangcheon-shop
          token: ${{ secrets.GH_PAT }}
          path: gwangcheon-shop

      # ── Step 1: analyze ─────────────────────────────────────────────────────
      - name: Collect and analyze PR history
        id: analyze
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          AI_DEV_LOOP_PROFILE: gwangcheon-shop/.claude/ai-dev-loop-profile.json
        run: |
          gh pr list \
            --repo rladmsgh34/gwangcheon-shop \
            --state merged --limit 300 \
            --json number,title,mergedAt,additions,deletions \
            > /tmp/prs.json

          FETCH_FLAG=""
          if [ "${{ inputs.fetch_files }}" != "false" ]; then
            FETCH_FLAG="--fetch-files"
          fi

          python3 src/analyze.py \
            --input /tmp/prs.json \
            --github-token "$GH_TOKEN" \
            --format json \
            $FETCH_FLAG \
            2>/dev/null > /tmp/report.json

          FIX_RATE=$(python3 -c "import json; d=json.load(open('/tmp/report.json')); print(d['summary']['fix_rate'])")
          CLUSTER_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/report.json')); print(len(d['clusters']))")
          echo "fix_rate=$FIX_RATE" >> $GITHUB_OUTPUT
          echo "cluster_count=$CLUSTER_COUNT" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      # ── Step 2: issue report ───────────────────────────────────────────────
      - name: Post daily report issue
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_DATE: ${{ steps.analyze.outputs.date }}
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, os

          d = json.load(open('/tmp/report.json'))
          s = d['summary']
          date = os.environ.get('REPORT_DATE', '')

          lines = [
            f"## 📊 일일 PR 품질 리포트 — {date}",
            "",
            f"**총 PR**: {s['total_prs']}개 | **fix PR**: {s['fix_prs']}개 ({s['fix_rate']}%)",
            "",
          ]

          clusters = d.get('clusters', [])
          if clusters:
            lines += ["### 📍 회귀 클러스터", "| 도메인 | PR 범위 | 크기 |", "|--------|---------|------|"]
            for c in clusters:
              lines.append(f"| `{c['domain']}` | #{c['start']} → #{c['end']} | {c['size']}개 |")
            lines.append("")

          domain_counts = d.get('domain_counts', [])
          if domain_counts:
            lines += ["### 🏴 도메인별 fix", "| 도메인 | 횟수 |", "|--------|------|"]
            for dc in domain_counts:
              lines.append(f"| `{dc['domain']}` | {dc['fix_count']}회 |")
            lines.append("")

          risky = d.get('risky_files', [])
          if risky:
            lines += ["### 📁 고위험 파일"]
            for f in risky[:5]:
              lines.append(f"- `{f['file']}` ({f['fix_count']}회)")
            lines.append("")

          rules = d.get('claude_md_suggestions', [])
          if rules:
            lines += ["### 💡 CLAUDE.md 개선 아이디어"]
            for r in rules:
              lines.append(r)

          lines += ["---", f"_[ai-dev-loop-analyzer](https://github.com/rladmsgh34/ai-dev-loop-analyzer) · {date}_"]

          body = "\n".join(lines)
          title = f"[일일 리포트] {date} — fix율 {s['fix_rate']}%"

          existing = json.loads(subprocess.run(
            ['gh', 'issue', 'list', '--label', 'daily-report', '--state', 'open',
             '--json', 'number,title', '--limit', '5'],
            capture_output=True, text=True
          ).stdout or '[]')

          today_issue = next((i for i in existing if date in i['title']), None)
          if today_issue:
            subprocess.run(['gh', 'issue', 'edit', str(today_issue['number']),
                            '--title', title, '--body', body], check=True)
          else:
            subprocess.run(['gh', 'issue', 'create', '--title', title,
                            '--body', body, '--label', 'daily-report'], check=True)
          PYEOF

      # ── Step 3: snapshot ───────────────────────────────────────────────────
      - name: Save rule effectiveness snapshot
        continue-on-error: true
        run: |
          python3 - <<'PYEOF'
          import json, sys
          sys.path.insert(0, 'src')
          from rule_tracker import record_snapshot, record_new_rules
          import os

          d = json.load(open('/tmp/report.json'))
          date = os.environ.get('REPORT_DATE', '')
          total_fix = d['summary']['fix_rate']
          total_prs = d['summary']['total_prs']

          # domain_counts는 raw count → 비율(%)로 변환
          domain_rates = {}
          for dc in d.get('domain_counts', []):
              if total_prs > 0:
                  domain_rates[dc['domain']] = round(dc['fix_count'] / total_prs * 100, 1)

          # 1) 스냅샷 기록
          record_snapshot(domain_rates, total_fix, date)
          print(f"스냅샷 기록 완료: {date}")

          # 2) 오늘 제안된 규칙을 히스토리에 등록 (추가 시점 fix-rate 기준점 저장)
          rules = d.get('claude_md_suggestions', [])
          if rules:
              added = record_new_rules(rules, domain_rates, total_fix, date)
              print(f"신규 규칙 등록: {len(added)}개")
          PYEOF
        env:
          REPORT_DATE: ${{ steps.analyze.outputs.date }}

      # ── 3.5단계: diff 패턴 누적 저장 (RAG 임베딩용) ────────────────────────
      - name: diff 패턴 저장
        continue-on-error: true
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path
          from datetime import datetime

          d = json.load(open('/tmp/report.json'))
          date = os.environ.get('REPORT_DATE', datetime.now().strftime('%Y-%m-%d'))
          repo = "rladmsgh34/gwangcheon-shop"

          patterns_path = Path("data/diff-patterns.json")
          existing = json.loads(patterns_path.read_text()) if patterns_path.exists() else {"patterns": []}

          # 이미 저장된 PR 번호 목록
          saved_prs = {(e["repo"], e["pr_number"]) for e in existing["patterns"]}

          new_count = 0
          for pr in d.get("fix_prs_with_diff", []):
              key = (repo, pr["number"])
              if key in saved_prs:
                  continue
              diff = pr.get("diff_snippet", "").strip()
              if not diff:
                  continue
              existing["patterns"].append({
                  "repo": repo,
                  "pr_number": pr["number"],
                  "title": pr.get("title", ""),
                  "domain": pr.get("domain", "general"),
                  "files": pr.get("files", []),
                  "diff_snippet": diff[:800],  # 800자 제한
                  "date": date,
              })
              new_count += 1

          # 최대 500개 유지 (오래된 것부터 제거)
          existing["patterns"] = existing["patterns"][-500:]
          existing["updated_at"] = date

          patterns_path.write_text(json.dumps(existing, ensure_ascii=False, indent=2))
          print(f"diff 패턴 {new_count}개 추가 (누적 {len(existing['patterns'])}개)")
          PYEOF
        env:
          REPORT_DATE: ${{ steps.analyze.outputs.date }}

      - name: 히스토리 파일 커밋
        run: |
          git config user.name "ai-dev-loop-analyzer[bot]"
          git config user.email "ai-dev-loop-analyzer@users.noreply.github.com"
          git add data/rules-history.json data/diff-patterns.json
          git diff --staged --quiet || git commit -m "data: daily snapshot ${{ steps.analyze.outputs.date }}"
          git push

      # ── Step 4: patch CLAUDE.md ────────────────────────────────────────────
      - name: Generate CLAUDE.md patch
        continue-on-error: true
        id: patch
        run: |
          python3 src/patch_claude_md.py \
            --report /tmp/report.json \
            --claude-md gwangcheon-shop/CLAUDE.md \
            --date "${{ steps.analyze.outputs.date }}" \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }} \
            2>&1 | tee /tmp/patch-log.txt

          if grep -q "신규 규칙 없음" /tmp/patch-log.txt; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # ── Step 4b: open PR (only when dry_run=false and changes exist) ────────
      - name: Open gwangcheon-shop PR
        if: steps.patch.outputs.has_changes == 'true' && inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          path: gwangcheon-shop
          commit-message: "chore: AI Dev Loop 자동 규칙 업데이트 (${{ steps.analyze.outputs.date }})"
          branch: chore/ai-loop-rules-${{ steps.analyze.outputs.date }}
          title: "🤖 CLAUDE.md 규칙 업데이트 (${{ steps.analyze.outputs.date }})"
          body: |
            ## AI Dev Loop — 자동 생성 PR

            [ai-dev-loop-analyzer](https://github.com/rladmsgh34/ai-dev-loop-analyzer)가
            PR 히스토리 + 리뷰 코멘트를 분석해 감지한 패턴을 CLAUDE.md에 반영합니다.

            ### 추가된 규칙
            ```
            ${{ steps.patch.outputs.rules }}
            ```

            ### 검토 방법
            1. 규칙이 실제 상황에 맞는지 확인
            2. 불필요한 규칙 삭제 후 머지
            3. 머지하면 다음 Claude Code 세션부터 자동 적용

            ---
            _fix율: ${{ steps.analyze.outputs.fix_rate }}% | 클러스터: ${{ steps.analyze.outputs.cluster_count }}개_
          labels: "documentation,ai-generated"
          delete-branch: true
