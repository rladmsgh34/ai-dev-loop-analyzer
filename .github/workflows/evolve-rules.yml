name: Evolve Rules

# 동시 실행 방지 — PR이 연속 머지되면 워크플로우가 겹쳐 data/*.json에 push 충돌 발생.
# cancel-in-progress: false 로 큐잉(순차 실행)하여 모든 분석이 반드시 실행되도록 보장.
concurrency:
  group: evolve-rules
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST — schedule="daily" 레포만
    - cron: '0 2 * * 0'   # 매주 일요일 KST 11시 — schedule="weekly" 레포만
  workflow_dispatch:
    inputs:
      target_repo:
        description: '특정 레포만 분석 (예: owner/repo). 미입력 시 enabled 레포 전체.'
        required: false
        default: ''
      fetch_files:
        description: 'fix PR 파일 + 리뷰 코멘트 수집 (더 정확, 느림)'
        type: boolean
        default: true
  repository_dispatch:
    types: [pr-merged]

jobs:
  # ── setup-matrix: config/repos.json → 트리거별 동적 매트릭스 ────────────────
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      count: ${{ steps.set.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - id: set
        env:
          INPUT_REPO: ${{ inputs.target_repo }}
          DISPATCH_REPO: ${{ github.event.client_payload.repo }}
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -e
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_REPO" ]; then
            MATRIX=$(jq --arg r "$INPUT_REPO" -c '[.[] | select(.repo == $r)]' config/repos.json)
          elif [ "$EVENT_NAME" = "repository_dispatch" ]; then
            REPO="${DISPATCH_REPO:-rladmsgh34/gwangcheon-shop}"
            MATRIX=$(jq --arg r "$REPO" -c '[.[] | select(.repo == $r and .enabled == true)]' config/repos.json)
          elif [ "$EVENT_NAME" = "schedule" ] && [ "$SCHEDULE" = "0 2 * * 0" ]; then
            MATRIX=$(jq -c '[.[] | select(.schedule == "weekly" and .enabled == true)]' config/repos.json)
          elif [ "$EVENT_NAME" = "schedule" ]; then
            MATRIX=$(jq -c '[.[] | select(.schedule == "daily" and .enabled == true)]' config/repos.json)
          else
            MATRIX=$(jq -c '[.[] | select(.enabled == true)]' config/repos.json)
          fi
          COUNT=$(echo "$MATRIX" | jq 'length')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "── selected ${COUNT} repo(s) ──"
          echo "$MATRIX" | jq '.'

  evolve:
    needs: setup-matrix
    if: needs.setup-matrix.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      # max-parallel: 1 — analyze.py에 incremental fetch가 없어 매번 fetch_limit만큼
      # gh API를 소비함. 직렬 실행으로 GITHUB_TOKEN(1000/hr) / GH_PAT(5000/hr) 한도 보호.
      max-parallel: 1
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    permissions:
      contents: write
    env:
      TARGET_REPO: ${{ matrix.target.repo }}
      FETCH_LIMIT: ${{ matrix.target.fetch_limit }}
      PROFILE_PATH: ${{ matrix.target.profile }}
      IS_PR_TRIGGER: ${{ github.event_name == 'repository_dispatch' }}

    steps:
      # ref 명시 — 기본값(detached HEAD)이면 뒤의 git push가 "not currently on a branch"로 실패.
      - name: Checkout ai-dev-loop-analyzer
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Ensure data directory
        run: |
          # repo_store.repo_slug() 단일 진실 공급원 — workflow가 직접 tr '/' '_'로
          # 만들면 '__' (double underscore)와 미스매치돼 cache가 영영 안 커밋됨.
          REPO_SLUG=$(python3 -c "import sys; sys.path.insert(0, 'src'); from repo_store import repo_slug; print(repo_slug('$TARGET_REPO'))")
          echo "REPO_SLUG=$REPO_SLUG" >> $GITHUB_ENV
          mkdir -p "data/repos/${REPO_SLUG}"

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.GH_PAT }}
          path: target-repo

      # GH_PAT rate-limit 체크포인트 — 매트릭스 iteration 시작.
      - name: rate_limit checkpoint (start)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api rate_limit --jq ".resources.core | \"[$TARGET_REPO] start: remaining=\\(.remaining) reset=\\(.reset)\""

      # ── Step 1: analyze ─────────────────────────────────────────────────────
      # 프로파일 우선순위:
      #   1. matrix.target.profile (config/repos.json) — 명시적 override
      #   2. target-repo/.claude/ai-dev-loop-profile.json — 타겟 레포 자체 보유
      #   3. 없으면 src/analyze.py의 built-in default
      - name: Collect and analyze PR history
        id: analyze
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -e
          LIMIT="$FETCH_LIMIT"
          FETCH_FLAG="--fetch-files"
          if [ "$IS_PR_TRIGGER" = "true" ]; then
            LIMIT=50
            FETCH_FLAG=""
          elif [ "${{ inputs.fetch_files }}" = "false" ]; then
            FETCH_FLAG=""
          fi

          PROFILE_FLAG=""
          if [ -n "$PROFILE_PATH" ] && [ -f "$PROFILE_PATH" ]; then
            PROFILE_FLAG="--profile $PROFILE_PATH"
            echo "profile: $PROFILE_PATH (matrix override)"
          elif [ -f "target-repo/.claude/ai-dev-loop-profile.json" ]; then
            PROFILE_FLAG="--profile target-repo/.claude/ai-dev-loop-profile.json"
            echo "profile: target-repo in-tree"
          else
            echo "profile: built-in default"
          fi

          # Incremental fetch: cache가 있으면 generated_at - 14일부터만 가져온다.
          # 14일 overlap = detect_clusters의 window=14일을 보존하기 위한 최소값.
          SEARCH_FLAG=""
          CACHE_PATH="data/repos/${REPO_SLUG}/analysis-cache.json"
          if [ -f "$CACHE_PATH" ]; then
            SINCE=$(python3 -c "
          import json
          from datetime import datetime, timedelta
          try:
              c = json.load(open('$CACHE_PATH'))
              d = datetime.strptime(c.get('generated_at', ''), '%Y-%m-%d') - timedelta(days=14)
              print(d.strftime('%Y-%m-%d'))
          except Exception:
              pass
          ")
            if [ -n "$SINCE" ]; then
              SEARCH_FLAG="--search merged:>=$SINCE"
              echo "incremental fetch since $SINCE (cache generated_at - 14d, covers cluster window)"
            fi
          else
            echo "first run for $TARGET_REPO — fetching latest $LIMIT PRs"
          fi

          gh pr list \
            --repo "$TARGET_REPO" \
            --state merged --limit $LIMIT \
            $SEARCH_FLAG \
            --json number,title,mergedAt,additions,deletions \
            > /tmp/prs.json

          python3 src/analyze.py \
            --input /tmp/prs.json \
            --github-token "$GH_TOKEN" \
            --format json \
            $PROFILE_FLAG \
            $FETCH_FLAG \
            2>/dev/null > /tmp/report.json

          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      # ── Step 1.5: analysis-cache 레포별 경로에 저장 ──────────────────────────
      # 캐시 빌드는 analyze.build_cache_dict()로 위임 (mcp_server와 동일 함수 → 스키마 드리프트 차단).
      - name: Save analysis cache to per-repo directory
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          from pathlib import Path
          sys.path.insert(0, 'src')

          target_repo = os.environ.get('TARGET_REPO', '')
          if not target_repo:
              print('TARGET_REPO 미지정 — 스킵')
              sys.exit(0)

          import analyze as ana

          profile_path = os.environ.get('PROFILE_PATH') or ''
          if not profile_path or not Path(profile_path).exists():
              fallback = 'target-repo/.claude/ai-dev-loop-profile.json'
              profile_path = fallback if Path(fallback).exists() else ''
          if profile_path:
              ana.load_profile(profile_path)
              print(f'프로파일 로드: {profile_path}')

          report = json.load(open('/tmp/report.json'))
          cache = ana.build_cache_dict(report, target_repo)

          from repo_store import cache_path
          p = cache_path(target_repo)
          p.write_text(json.dumps(cache, ensure_ascii=False, indent=2))
          print(f'✅ analysis-cache 저장: {p}')
          PYEOF

      # ── Step 2: diff 패턴 누적 저장 (RAG 임베딩용 핵심 입력) ────────────────
      - name: diff 패턴 저장
        continue-on-error: true
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path
          from datetime import datetime

          d = json.load(open('/tmp/report.json'))
          date = os.environ.get('REPORT_DATE', datetime.now().strftime('%Y-%m-%d'))
          repo = os.environ.get('TARGET_REPO', 'unknown')

          patterns_path = Path("data/diff-patterns.json")
          existing = json.loads(patterns_path.read_text()) if patterns_path.exists() else {"patterns": []}

          saved_prs = {(e["repo"], e["pr_number"]) for e in existing["patterns"]}

          new_count = 0
          for pr in d.get("fix_prs_with_diff", []):
              key = (repo, pr["number"])
              if key in saved_prs:
                  continue
              diff = pr.get("diff_snippet", "").strip()
              if not diff:
                  continue
              existing["patterns"].append({
                  "repo": repo,
                  "pr_number": pr["number"],
                  "title": pr.get("title", ""),
                  "domain": pr.get("domain", "general"),
                  "files": pr.get("files", []),
                  "diff_snippet": diff[:800],
                  "date": date,
              })
              new_count += 1

          # 최대 500개 유지 (오래된 것부터 제거)
          existing["patterns"] = existing["patterns"][-500:]
          existing["updated_at"] = date

          patterns_path.write_text(json.dumps(existing, ensure_ascii=False, indent=2))
          print(f"diff 패턴 {new_count}개 추가 (누적 {len(existing['patterns'])}개)")
          PYEOF
        env:
          REPORT_DATE: ${{ steps.analyze.outputs.date }}
          TARGET_REPO: ${{ env.TARGET_REPO }}

      - name: 데이터 커밋
        env:
          TARGET_REPO: ${{ env.TARGET_REPO }}
        run: |
          set -e
          git config user.name "ai-dev-loop-analyzer[bot]"
          git config user.email "ai-dev-loop-analyzer@users.noreply.github.com"
          git add data/diff-patterns.json || true
          git add "data/repos/${REPO_SLUG}/" || true
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 스킵"
            exit 0
          fi
          git commit -m "data: daily snapshot ${{ steps.analyze.outputs.date }} [${TARGET_REPO}]"
          BRANCH="$(git rev-parse --abbrev-ref HEAD)"
          git push origin "$BRANCH" || (git pull --rebase origin "$BRANCH" && git push origin "$BRANCH")

      # rate_limit end checkpoint — `if: always()`로 앞 step 실패 시에도 측정
      - name: rate_limit checkpoint (end)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api rate_limit --jq ".resources.core | \"[$TARGET_REPO] end: remaining=\\(.remaining) reset=\\(.reset)\""
