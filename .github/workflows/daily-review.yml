name: Daily PR Pattern Review

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST (UTC+9 = UTC 01:00)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: gwangcheon-shop PR 분석
        id: analyze
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TARGET_REPO: rladmsgh34/gwangcheon-shop
        run: |
          # 대상 레포 PR 수집 (개인 레포라 token 필요)
          gh pr list \
            --repo $TARGET_REPO \
            --state merged \
            --limit 300 \
            --json number,title,mergedAt,additions,deletions \
            > /tmp/prs.json 2>/dev/null || {
              echo "레포 접근 실패 (private 레포는 PAT 필요)" >&2
              exit 1
            }

          python3 src/analyze.py \
            --input /tmp/prs.json \
            --github-token "$GH_TOKEN" \
            --format json \
            2>/dev/null > /tmp/report.json

          # GitHub Actions output
          FIX_RATE=$(python3 -c "import json; d=json.load(open('/tmp/report.json')); print(d['summary']['fix_rate'])")
          CLUSTER_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/report.json')); print(len(d['clusters']))")
          echo "fix_rate=$FIX_RATE" >> $GITHUB_OUTPUT
          echo "cluster_count=$CLUSTER_COUNT" >> $GITHUB_OUTPUT

      - name: 이슈로 일일 리포트 게시
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, subprocess, datetime

          d = json.load(open('/tmp/report.json'))
          s = d['summary']
          today = datetime.datetime.utcnow().strftime('%Y-%m-%d')

          lines = [
            f"## 📊 일일 PR 품질 리포트 — {today}",
            "",
            f"**분석 대상**: rladmsgh34/gwangcheon-shop",
            f"**총 PR**: {s['total_prs']}개 | **fix PR**: {s['fix_prs']}개 ({s['fix_rate']}%)",
            "",
          ]

          clusters = d.get('clusters', [])
          if clusters:
            lines += ["### 📍 회귀 클러스터", "| 도메인 | PR 범위 | 크기 |", "|--------|---------|------|"]
            for c in clusters:
              lines.append(f"| `{c['domain']}` | #{c['start']} → #{c['end']} | {c['size']}개 |")
            lines.append("")

          domain_counts = d.get('domain_counts', [])
          if domain_counts:
            lines += ["### 🏴 도메인별 fix 횟수", "| 도메인 | 횟수 |", "|--------|------|"]
            for dc in domain_counts:
              lines.append(f"| `{dc['domain']}` | {dc['fix_count']}회 |")
            lines.append("")

          risky = d.get('risky_files', [])
          if risky:
            lines += ["### 📁 고위험 파일"]
            for f in risky[:5]:
              lines.append(f"- `{f['file']}` ({f['fix_count']}회)")
            lines.append("")

          rules = d.get('claude_md_suggestions', [])
          if rules:
            lines += ["### 💡 ai-dev-loop-analyzer 개선 아이디어"]
            lines.append("> 아래 패턴을 도구에 반영할 수 있는지 검토해주세요.")
            lines.append("")
            for r in rules:
              lines.append(r)
            lines.append("")

          lines += [
            "---",
            "_자동 생성: [ai-dev-loop-analyzer](https://github.com/rladmsgh34/ai-dev-loop-analyzer)_"
          ]

          body = "\n".join(lines)
          title = f"[일일 리포트] {today} — fix율 {s['fix_rate']}%"

          # 오늘 이미 이슈가 있으면 업데이트, 없으면 생성
          result = subprocess.run(
            ['gh', 'issue', 'list', '--label', 'daily-report', '--state', 'open',
             '--json', 'number,title', '--limit', '5'],
            capture_output=True, text=True
          )
          existing = json.loads(result.stdout) if result.returncode == 0 else []
          today_issue = next((i for i in existing if today in i['title']), None)

          if today_issue:
            subprocess.run([
              'gh', 'issue', 'edit', str(today_issue['number']),
              '--title', title, '--body', body
            ], check=True)
            print(f"이슈 #{today_issue['number']} 업데이트")
          else:
            subprocess.run([
              'gh', 'issue', 'create',
              '--title', title,
              '--body', body,
              '--label', 'daily-report'
            ], check=True)
          PYEOF

      - name: daily-report 라벨 생성 (없을 경우)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "daily-report" --color "0075ca" --description "일일 자동 분석 리포트" 2>/dev/null || true
